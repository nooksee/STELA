# STATUS: Experimental
# DEPLOYMENT: Gemini Gem instructions
# PROOF: Operator-visible Gem settings + behavior probes
name: gemini-adapter
description: "External runtime adapter for Gemini-based Stela sessions, primarily to constrain startup behavior and output contamination."
version: 1.0.0
adapter_class: external-runtime-adapter
status: experimental

deployment:
  platform: "Gemini"
  surface: "Gem instructions"
  operator_action: "Do nothing while status is experimental and undeployed. Add instruction_text only in a later activation step if operator testing decides the adapter is needed."
  proof_model:
    source_proof: "Operator-visible Gem instruction text or screenshot."
    supporting_evidence:
      - "behavior probe"
      - "execution-decision log"

scope:
  intended_roles:
    - architect
    - audit
  failure_modes_targeted:
    - attachment-startup-fallback
    - citation-token
    - follow-on-question

validation:
  behavior_probe: |
    Use current attachments first. Execute the implied task. Emit only the requested final artifact. No citation tokens. No follow-on question.
  expected_signals:
    - "Model does not emit cite_start or related citation tokens in audit or architect outputs."
    - "Model does not append a follow-on question after the requested artifact."
    - "Model starts from current-turn attachments instead of upload-summary chatter."

sunset_condition: "Retire or narrow once Gemini produces two consecutive clean validation rounds without citation-token or startup-fallback failures."
notes:
  - "Experimental adapter: no instruction_text is carried while undeployed."
  - "Add instruction_text only when Gemini-specific activation is explicitly chosen."

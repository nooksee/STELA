name: gates

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed paths for gate routing
        id: changed_paths
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          mkdir -p var/tmp
          git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}"...HEAD > var/tmp/gates-paths.txt
          echo "changed_paths_file=var/tmp/gates-paths.txt" >> "$GITHUB_OUTPUT"
          echo "changed_count=$(wc -l < var/tmp/gates-paths.txt)" >> "$GITHUB_OUTPUT"

      - name: Surface HEAD pointer reachability
        run: |
          set -euo pipefail
          for surface in PoW.md SoP.md TASK.md; do
            if [[ ! -f "${surface}" ]]; then
              echo "ERROR: missing surface ${surface}"
              exit 1
            fi

            line_count="$(awk 'END { print NR }' "${surface}")"
            if [[ "${line_count}" != "1" ]]; then
              echo "ERROR: ${surface} must be a single-line HEAD pointer"
              exit 1
            fi

            pointer="$(tr -d '\r' < "${surface}")"
            pointer="${pointer#./}"
            if [[ ! "${pointer}" =~ ^archives/surfaces/[A-Za-z0-9._/-]+\.md$ ]]; then
              echo "ERROR: ${surface} does not contain a valid archives/surfaces pointer"
              exit 1
            fi

            if [[ ! -f "${pointer}" ]]; then
              echo "ERROR: ${surface} pointer target missing: ${pointer}"
              exit 1
            fi
          done
          echo "OK: surface pointer reachability checks passed."

      - name: Verify tree
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            bash tools/verify.sh --mode=gates --paths-file="${{ steps.changed_paths.outputs.changed_paths_file }}"
          else
            bash tools/verify.sh --mode=full
          fi

      - name: Truth lint (authored surfaces)
        run: bash tools/lint/truth.sh

      - name: Enforce schema integrity on surface leaves
        run: bash tools/lint/schema.sh

      - name: Enforce Linguistic Precision mandate
        run: bash tools/lint/style.sh

      - name: Context lint
        run: bash tools/lint/context.sh

      - name: Agent lint
        run: bash tools/lint/agent.sh

      # NEW: Enforce Factory Registry
      - name: Factory Guard
        run: bash tools/lint/factory.sh

      - name: DP lint (TASK baseline)
        run: bash tools/lint/dp.sh TASK.md

      - name: RESULTS lint
        run: bash tools/lint/results.sh

      - name: Leaf coverage lint
        run: bash tools/lint/leaf.sh
